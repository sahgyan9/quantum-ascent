<meta charset="utf-8">
<title>Spinning Coin — Quantum Ascent</title>
<link rel="stylesheet" href="../_base/widget.css">
<style>
  .wrap { display: flex; gap: 20px; max-width: 880px; align-items: flex-start; }
  .coin-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0b1020; border: 1px solid var(--line); border-radius: 10px; padding: 40px; }
  
  .coin {
    width: 150px;
    height: 150px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.1s linear;
  }
  
  .spinning {
    animation: spin 0.5s linear infinite;
  }
  
  @keyframes spin {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }
  
  .face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: bold;
    color: #fff;
    border: 8px solid;
  }
  
  .heads { background: var(--cyan); border-color: #083344; transform: rotateY(0deg); }
  .tails { background: var(--violet); border-color: #2e1065; transform: rotateY(180deg); }
  
  .right { flex: 1; display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .bars { display: grid; grid-template-columns: 50px 1fr 64px; gap: 6px; align-items: center; }
  .track { height: 16px; background: #0e1530; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .fill  { height: 100%; width: 0%; transition: width .15s; }
  .h0 { background: rgba(34,211,238,.45); } .h1 { background: rgba(139,92,246,.45); }
  
  #flash { min-height: 22px; font-weight: 700; text-align: center; margin-top: 15px; }
  .pop { animation: pop .35s; } @keyframes pop { 0% {transform: scale(1.4);} 100% {transform: scale(1);} }
  
  .controls { margin-top: 30px; display: flex; gap: 10px; justify-content: center; }
</style>

<div class="hint-bar" id="hint">💡 <b>Try this:</b> The coin is spinning in a 50/50 superposition. Click <b>Slap! (Measure)</b> to collapse it to a definite Heads (0) or Tails (1). Notice the statistics!</div>

<div class="wrap">
  <div class="coin-container">
    <div class="coin spinning" id="coin">
      <div class="face heads">0</div>
      <div class="face tails">1</div>
    </div>
    <div id="flash">...spinning...</div>
    <div class="controls">
      <button id="m1">Slap! (Measure ×1)</button>
    </div>
  </div>

  <div class="right">
    <div class="panel">
      <div style="color:var(--muted);margin:8px 0 2px">Measured so far (<span id="shots">0</span> shots):</div>
      <div class="bars">
        <span>0 (H):</span><div class="track"><div class="fill h0" id="h0bar"></div></div><span class="readout" id="c0">0</span>
        <span>1 (T):</span><div class="track"><div class="fill h1" id="h1bar"></div></div><span class="readout" id="c1">0</span>
      </div>
      <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button id="m100" class="violet">Slap ×100</button>
        <button id="reset" class="secondary">Reset</button>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const coin = $("coin");
const state = { c0: 0, c1: 0, isSpinning: true };

function renderStats() {
  const shots = state.c0 + state.c1;
  $("shots").textContent = shots;
  $("c0").textContent = state.c0;
  $("c1").textContent = state.c1;
  $("h0bar").style.width = (shots ? 100 * state.c0 / shots : 0) + "%";
  $("h1bar").style.width = (shots ? 100 * state.c1 / shots : 0) + "%";
}

function startSpinning() {
  state.isSpinning = true;
  coin.style.transition = "none";
  coin.classList.add("spinning");
  $("flash").textContent = "...spinning...";
  $("flash").style.color = "var(--muted)";
  $("m1").textContent = "Slap! (Measure ×1)";
}

function measure(n) {
  if (n === 1 && !state.isSpinning) {
    // Resume spinning if we just click slap again after it stopped
    startSpinning();
    return;
  }
  
  let last = 0;
  for (let i = 0; i < n; i++) {
    last = Math.random() < 0.5 ? 0 : 1;
    state[last === 0 ? "c0" : "c1"]++;
  }
  
  if (n === 1) {
    state.isSpinning = false;
    coin.classList.remove("spinning");
    // Force transition to snap to correct face
    coin.style.transition = "transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    coin.style.transform = last === 0 ? "rotateY(0deg)" : "rotateY(180deg)";
    $("m1").textContent = "Spin again";
  }
  
  const f = $("flash");
  f.textContent = n === 1 ? (last === 0 ? "Heads! (0)" : "Tails! (1)") : "→ " + n + " shots sampled";
  f.style.color = last === 0 ? "var(--cyan)" : "var(--violet)";
  f.classList.remove("pop"); void f.offsetWidth; f.classList.add("pop");
  
  renderStats();
}

$("m1").addEventListener("click", () => measure(1));
$("m100").addEventListener("click", () => measure(100));
$("reset").addEventListener("click", () => {
  state.c0 = 0; state.c1 = 0;
  renderStats();
  startSpinning();
});

renderStats();
</script>
