<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background Glow Filter -->
    <filter id="ultraGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.8"/> <!-- Deep Indigo -->
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/> <!-- Slate Dark -->
    </linearGradient>
    
    <linearGradient id="trailGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />  <!-- Violet -->
      <stop offset="40%" stop-color="#ec4899" /> <!-- Pink -->
      <stop offset="85%" stop-color="#06b6d4" /> <!-- Cyan -->
      <stop offset="100%" stop-color="#34d399" /> <!-- Mint Green -->
    </linearGradient>

    <linearGradient id="summitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" /> <!-- Gold -->
      <stop offset="100%" stop-color="#f59e0b" /> <!-- Amber -->
    </linearGradient>
  </defs>

  <!-- Dark container plate for contrast (works on both light/dark pages) -->
  <rect width="100" height="100" rx="20" fill="#070a13"/>

  <!-- Sleek background grid lines for a high-tech/quantum vibe -->
  <line x1="10" y1="80" x2="90" y2="80" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="50" y1="10" x2="50" y2="90" stroke="#1e293b" stroke-width="1" stroke-dasharray="2 3"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="1 4"/>

  <!-- Stylized Geometric Mountain Peak (Glassmorphism & Bold Stroke) -->
  <polygon points="50,22 82,78 18,78" fill="url(#mountainGrad)" stroke="#1e293b" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Secondary ridge line -->
  <path d="M50 22 L50 78" stroke="#1e293b" stroke-width="1.5" opacity="0.6"/>

  <!-- Successive Ascent Trail (Thick flowing gradient path) -->
  <path d="M22 75 Q 35 55, 45 60 T 65 48 T 80 25" fill="none" stroke="url(#trailGrad)" stroke-width="3" stroke-linecap="round" filter="url(#ultraGlow)"/>

  <!-- Successive Qubit Nodes (Layered for high visibility) -->
  <!-- Basecamp 1 -->
  <circle cx="22" cy="75" r="4.5" fill="#8b5cf6" filter="url(#ultraGlow)" opacity="0.4"/>
  <circle cx="22" cy="75" r="2.5" fill="#a78bfa"/>
  <circle cx="22" cy="75" r="1" fill="#ffffff"/>

  <!-- Basecamp 2 -->
  <circle cx="34" cy="62" r="5" fill="#d946ef" filter="url(#ultraGlow)" opacity="0.4"/>
  <circle cx="34" cy="62" r="3" fill="#f472b6"/>
  <circle cx="34" cy="62" r="1.2" fill="#ffffff"/>

  <!-- Basecamp 3 -->
  <circle cx="48" cy="56" r="5.5" fill="#ec4899" filter="url(#ultraGlow)" opacity="0.4"/>
  <circle cx="48" cy="56" r="3.2" fill="#f43f5e"/>
  <circle cx="48" cy="56" r="1.3" fill="#ffffff"/>

  <!-- Basecamp 4 -->
  <circle cx="60" cy="48" r="6" fill="#06b6d4" filter="url(#ultraGlow)" opacity="0.4"/>
  <circle cx="60" cy="48" r="3.5" fill="#22d3ee"/>
  <circle cx="60" cy="48" r="1.5" fill="#ffffff"/>

  <!-- Basecamp 5 -->
  <circle cx="70" cy="38" r="6.5" fill="#14b8a6" filter="url(#ultraGlow)" opacity="0.4"/>
  <circle cx="70" cy="38" r="3.8" fill="#2dd4bf"/>
  <circle cx="70" cy="38" r="1.5" fill="#ffffff"/>

  <!-- Summit Qubit (Bold Golden Pulse) -->
  <!-- Outer pulse ring -->
  <circle cx="80" cy="25" r="11" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.8" filter="url(#ultraGlow)"/>
  <!-- Inner glow halo -->
  <circle cx="80" cy="25" r="8" fill="url(#summitGrad)" filter="url(#ultraGlow)" opacity="0.6"/>
  <!-- Core sphere -->
  <circle cx="80" cy="25" r="4.5" fill="#ffffff" filter="url(#ultraGlow)"/>
  <!-- Center Star sparkle -->
  <path d="M80 20 L80 30 M75 25 L85 25" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
</svg>
