<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Basecamp — Quantum Ascent</title>
<meta name="description" content="Interactive basecamp module detail page on Quantum Ascent. Build intuition with widgets and complete code tasks.">
<link rel="stylesheet" href="assets/css/site.css">
<!-- KaTeX Math Rendering -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>

<!-- Nav dismiss overlay: tap outside the menu to close it -->
<a href="#" class="nav-dismiss" aria-hidden="true" tabindex="-1"></a>

<nav id="nav">
  <a href="index.html" class="nav-name"><img src="assets/logo.svg" alt="" width="24" height="24"> Quantum <span>Ascent</span></a>
  <a href="#nav-menu" class="nav-burger" id="nav-burger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </a>
  <div class="nav-links" id="nav-menu">
    <a href="ascent.html">The Ascent</a>
    <a href="widgets.html">Widget Gallery</a>
    <a href="analogy-studio.html">Analogy Studio</a>
    <span id="xp-pill">⚡ 0 XP · 0/6</span>
  </div>
</nav>

<div class="container" id="content">
  <p class="muted">Loading basecamp…</p>
</div>

<footer>
  Built for the WISER Education Challenge 2026 ·
  <a href="ascent.html">Back to the Ascent</a>
</footer>

<script src="assets/js/progress.js"></script>
<script src="assets/js/quiz.js"></script>
<script src="assets/js/confetti.js"></script>
<script src="assets/js/glossary.js"></script>
<script>
"use strict";
(async () => {
  const id = new URLSearchParams(location.search).get("id") || "01";
  const data = await (await fetch("assets/data/modules.json")).json();
  const m = data.modules.find(x => x.id === id);
  const el = document.getElementById("content");
  if (!m) { el.innerHTML = "<p>Unknown basecamp.</p>"; return; }

  document.title = `Basecamp ${m.id}: ${m.title} — Quantum Ascent`;
  const gh = data.github;
  const colab = `https://colab.research.google.com/github/${gh}/blob/main/${m.notebook}`;
  const nbviewer = `https://nbviewer.org/github/${gh}/blob/main/${m.notebook}`;
  const soon = m.status === "coming-soon";
  const prev = data.modules[data.modules.indexOf(m) - 1];
  const next = data.modules[data.modules.indexOf(m) + 1];

  el.innerHTML = `
    <h1>${m.id === "06" ? "🏔️ " : ""}Basecamp ${m.id}: ${m.title}</h1>
    <p class="muted">${m.subtitle} · ~${m.minutes} min · ${m.xp} XP
      ${m.badge ? `· earns the <span class="badge-chip">🏅 ${m.badge}</span> badge` : ""}</p>

    <div class="panel" style="margin: 20px 0">
      <h3 style="font-size: 16px; margin-bottom: 12px; color: var(--text);">🎯 What you will learn:</h3>
      <ul class="learning-list">
        ${m.concepts.map(concept => `
          <li class="learning-item">
            <span class="marker-green">✓</span>
            <span>${concept}</span>
          </li>
        `).join("")}
      </ul>
    </div>

    ${soon ? `<div class="panel" style="border-color:var(--accent)">
        🚧 This basecamp is being carved out of the mountain. Check back soon —
        or start with <a href="module.html?id=01">Basecamp 1</a>.</div>` : `
    
    <div class="panel" style="border-color: var(--accent); background: var(--accent-bg); margin: 24px 0 32px;">
      <h3 style="font-size: 16px; margin-bottom: 8px; color: var(--text); display: flex; align-items: center; gap: 8px; font-family: var(--font-heading);">
        🏔️ Climber's Guide — How to conquer this Basecamp:
      </h3>
      <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 12px; font-size: 14.5px;">
        <div style="display: flex; gap: 10px; align-items: flex-start;">
          <span style="color: var(--accent); font-weight: 700; font-family: var(--font-heading); flex-shrink: 0; white-space: nowrap;">Step 1:</span>
          <span>Start in <b>Section 1</b> below and play with the <b>Interactive Widget</b>. Poke it, make predictions — let your hands build the intuition <i>before</i> any math arrives.</span>
        </div>
        <div style="display: flex; gap: 10px; align-items: flex-start;">
          <span style="color: var(--accent); font-weight: 700; font-family: var(--font-heading); flex-shrink: 0; white-space: nowrap;">Step 2:</span>
          <span>Open the <b>Jupyter Notebook</b> in <b>Section 2</b>. Work through it line by line to name what you just saw, and complete the code tasks yourself.</span>
        </div>
        <div style="display: flex; gap: 10px; align-items: flex-start;">
          <span style="color: var(--accent); font-weight: 700; font-family: var(--font-heading); flex-shrink: 0; white-space: nowrap;">Step 3:</span>
          <span>Take the <b>Quiz</b> in <b>Section 3</b> to lock in your XP and claim your badge!</span>
        </div>
      </div>
    </div>

    <h2 class="section">1 · Build intuition — play with the widget</h2>
    <div class="learning-list" style="margin: 16px 0 24px;">
      <div class="learning-item">
        <span class="marker-green">1</span>
        <span><b>Explore:</b> Poke the interactive widgets, adjust inputs, and notice how the state moves.</span>
      </div>
      <div class="learning-item">
        <span class="marker-green">2</span>
        <span><b>Predict:</b> Guess the statistics of measurement outcomes before you sample.</span>
      </div>
      <div class="learning-item">
        <span class="marker-green">3</span>
        <span><b>Observe:</b> Run measurements (shots) to see the random collapse align with probabilities.</span>
      </div>
    </div>
    <figure class="widget-stage">
      <figcaption class="widget-stage-bar">
        <span class="widget-stage-label">🎛️ Interactive — poke it, predict, then measure</span>
        <a class="widget-stage-pop" href="widgets/${m.widget}/index.html" target="_blank" rel="noopener">Open in a new tab ↗</a>
      </figcaption>
      <iframe src="widgets/${m.widget}/index.html" title="${m.widget} interactive widget" loading="lazy"></iframe>
    </figure>
 
    <h2 class="section">2 · Do the physics — the interactive notebook</h2>
    <div class="learning-list" style="margin: 16px 0 24px;">
      <div class="learning-item">
        <span class="marker-green">✓</span>
        <span><b>Gap-Fill Challenges:</b> Complete incomplete code files to verify your mathematical understanding.</span>
      </div>
      <div class="learning-item">
        <span class="marker-green">✓</span>
        <span><b>Instant Checkers:</b> Get explainers on *why* your circuit or math failed, not just *that* it did.</span>
      </div>
      <div class="learning-item">
        <span class="marker-green">✓</span>
        <span><b>No Setup Required:</b> Open directly in Google Colab and run on free cloud servers.</span>
      </div>
    </div>
    <div class="panel" style="border-color: var(--accent); background: var(--accent-bg); margin: 4px 0 18px;">
      <h3 style="font-size: 15px; margin-bottom: 8px; color: var(--text); font-family: var(--font-heading);">🧭 First time opening a notebook? Here's exactly what happens — no surprises:</h3>
      <ul style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 7px; font-size: 14px;">
        <li style="display:flex; gap:8px;"><span>1.</span><span>A new tab opens <b>Google Colab</b> — Google's <b>free</b> cloud notebook. There is <b>nothing to install</b>.</span></li>
        <li style="display:flex; gap:8px;"><span>2.</span><span>You'll be asked to <b>sign in with a Google account</b> (the same one you use for Gmail). That's the only requirement.</span></li>
        <li style="display:flex; gap:8px;"><span>3.</span><span>Run the cells <b>top to bottom</b> — click a cell, press <b>▶</b> (or Shift+Enter). Start with the "Setup — run me first" cell.</span></li>
        <li style="display:flex; gap:8px;"><span>4.</span><span>If a pop-up warns the notebook "was not authored by Google," that's normal for shared notebooks — click <b>Run anyway</b>.</span></li>
        <li style="display:flex; gap:8px;"><span>5.</span><span>When you finish the tasks, <b>come back to this page</b> and take the quiz below to earn your XP and badge. 🏅</span></li>
      </ul>
      <p class="muted" style="margin: 10px 0 0; font-size: 13.5px;">Prefer to just look first, without signing in? Use <b>Preview (nbviewer)</b> — it shows the whole notebook read-only.</p>
    </div>
    <div style="display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;">
      <a class="btn" href="${colab}" target="_blank" rel="noopener">▶ Open in Google Colab</a>
      <a class="btn ghost" href="${nbviewer}" target="_blank" rel="noopener">👀 Preview first (no sign-in)</a>
    </div>

    <div class="panel" id="claim" style="border-color: var(--accent); background: var(--accent-bg); margin: 4px 0 28px;">
      <h3 style="font-size: 16px; margin-bottom: 6px; color: var(--text); font-family: var(--font-heading); display: flex; align-items: center; gap: 8px;">⛏️ Finished the notebook? Log your climb</h3>
      <p class="muted" style="margin: 0 0 12px; font-size: 14px;">The notebook's last cell prints a personal <b>completion code</b> once your Task 1 &amp; Task 2 circuits pass. Paste it here to log the notebook on your <a href="ascent.html">Ascent map</a> and bank your climber XP. (Finishing the notebook is the one thing the quiz can't check for you — so it's the one thing you get to prove.)</p>
      <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
        <input id="claim-input" type="text" placeholder="QA-${m.id}-XXXX-XXXX" autocomplete="off" spellcheck="false" aria-label="Notebook completion code"
          style="flex: 1; min-width: 200px; font-family: var(--font-code); font-size: 15px; letter-spacing: 0.5px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); color: var(--text); text-transform: uppercase;">
        <button class="btn" id="claim-btn" type="button">Log it 🚩</button>
      </div>
      <div id="claim-msg" style="margin-top: 10px; font-size: 14px; min-height: 20px;" aria-live="polite"></div>
    </div>

    <h2 class="section" id="quiz">3 · Prove it — the quiz</h2>
    <div id="quiz-box"></div>`}

    <div style="margin-top:36px;display:flex;justify-content:space-between">
      <span>${prev ? `<a href="module.html?id=${prev.id}">← Basecamp ${prev.id}: ${prev.title}</a>` : ""}</span>
      <span>${next ? `<a href="module.html?id=${next.id}">Basecamp ${next.id}: ${next.title} →</a>` : ""}</span>
    </div>`;

  // The "Log your climb" box redeems the code the notebook prints — closing the
  // web↔Colab loop with clear, kind feedback for every outcome (Norman).
  function renderClaim(mid) {
    const input = document.getElementById("claim-input");
    const btn = document.getElementById("claim-btn");
    const msg = document.getElementById("claim-msg");
    if (!input || !btn) return;
    const ok = t => `<span style="color:var(--accent-strong)">${t}</span>`;
    const bad = t => `<span style="color:var(--danger)">${t}</span>`;
    // Show current state up front (visibility of system status).
    if (Progress.get().modules[mid]?.notebookDone) {
      msg.innerHTML = ok("✓ Notebook already logged for this basecamp — you're all set.");
    }
    const submit = () => {
      const res = Progress.redeemCode(input.value);
      if (res.ok && res.moduleId === mid && !res.already) {
        msg.innerHTML = ok(`🎉 Logged! +${res.gained} climber XP — this camp now shows a ⛏️ on your <a href="ascent.html">Ascent map</a>.`);
        if (window.confettiBurst) window.confettiBurst();
      } else if (res.ok && res.moduleId === mid) {
        msg.innerHTML = ok("✓ Already logged — nothing more to do here.");
      } else if (res.ok) {
        msg.innerHTML = `<span style="color:var(--amber)">That code is valid — but it's for Basecamp ${res.moduleId}. <a href="module.html?id=${res.moduleId}#claim">Log it there →</a></span>`;
      } else if (res.reason === "format") {
        msg.innerHTML = bad(`That doesn't look like a code yet. It should read <b>QA-${mid}-XXXX-XXXX</b> — copy the whole line from the notebook's last cell.`);
      } else {
        msg.innerHTML = bad("That code didn't verify. Copy it exactly from <i>this</i> basecamp's notebook — it only prints once both tasks pass.");
      }
    };
    btn.addEventListener("click", submit);
    input.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); submit(); } });
  }

  if (!soon) {
    Progress.markOpened(id);
    renderQuiz("quiz-box", id, m);
    renderClaim(id);
  }
  // Give first-timers a hover/tap safety net on the key vocabulary.
  Glossary.enhance(el);
})();
</script>
<script src="assets/js/nav.js"></script>
</body>
</html>
