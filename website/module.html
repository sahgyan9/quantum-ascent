<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Basecamp — Quantum Ascent</title>
<meta name="description" content="Interactive basecamp module detail page on Quantum Ascent. Build intuition with widgets and complete code tasks.">
<link rel="stylesheet" href="assets/css/site.css">
<!-- KaTeX Math Rendering -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>

<nav>
  <a class="brand" href="index.html">🏔️ Quantum <span>Ascent</span></a>
  <a class="navlink" href="ascent.html">The Ascent</a>
  <a class="navlink" href="widgets.html">Widget Gallery</a>
  <a class="navlink" href="analogy-studio.html">Analogy Studio</a>
  <div class="spacer"></div>
  <span id="xp-pill">⚡ 0 XP · 0/6</span>
  <button id="theme-toggle">☀️ Light</button>
</nav>

<div class="container" id="content">
  <p class="muted">Loading basecamp…</p>
</div>

<footer>
  Built for the WISER Education Challenge 2026 ·
  <a href="ascent.html">Back to the Ascent</a>
</footer>

<script src="assets/js/progress.js"></script>
<script src="assets/js/quiz.js"></script>
<script src="assets/js/confetti.js"></script>
<script>
"use strict";
(async () => {
  const id = new URLSearchParams(location.search).get("id") || "01";
  const data = await (await fetch("assets/data/modules.json")).json();
  const m = data.modules.find(x => x.id === id);
  const el = document.getElementById("content");
  if (!m) { el.innerHTML = "<p>Unknown basecamp.</p>"; return; }

  document.title = `Basecamp ${m.id}: ${m.title} — Quantum Ascent`;
  const gh = data.github;
  const colab = `https://colab.research.google.com/github/${gh}/blob/main/${m.notebook}`;
  const nbviewer = `https://nbviewer.org/github/${gh}/blob/main/${m.notebook}`;
  const soon = m.status === "coming-soon";
  const prev = data.modules[data.modules.indexOf(m) - 1];
  const next = data.modules[data.modules.indexOf(m) + 1];

  el.innerHTML = `
    <h1>${m.id === "06" ? "🏔️ " : ""}Basecamp ${m.id}: ${m.title}</h1>
    <p class="muted">${m.subtitle} · ~${m.minutes} min · ${m.xp} XP
      ${m.badge ? `· earns the <span class="badge-chip">🏅 ${m.badge}</span> badge` : ""}</p>

    <div class="panel" style="margin: 20px 0">
      <h3 style="font-size: 16px; margin-bottom: 12px; color: var(--text);">🎯 What you will learn:</h3>
      <ul class="learning-list">
        ${m.concepts.map(concept => `
          <li class="learning-item">
            <span class="marker-green">✓</span>
            <span>${concept}</span>
          </li>
        `).join("")}
      </ul>
    </div>

    ${soon ? `<div class="panel" style="border-color:var(--violet)">
        🚧 This basecamp is being carved out of the mountain. Check back soon —
        or start with <a href="module.html?id=01">Basecamp 1</a>.</div>` : `
    
    <div class="panel" style="border-color: var(--violet); background: rgba(139, 92, 246, 0.03); margin: 24px 0 32px;">
      <h3 style="font-size: 16px; margin-bottom: 8px; color: var(--text); display: flex; align-items: center; gap: 8px; font-family: var(--font-heading);">
        🏔️ Climber's Guide — How to conquer this Basecamp:
      </h3>
      <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 12px; font-size: 14.5px;">
        <div style="display: flex; gap: 10px; align-items: flex-start;">
          <span style="color: var(--cyan); font-weight: 700; font-family: var(--font-heading);">Step 1:</span>
          <span>Scroll down to <b>Section 2</b> and open the <b>Jupyter Notebook</b>. Read it line by line to understand the quantum mechanics theory and complete the code tasks.</span>
        </div>
        <div style="display: flex; gap: 10px; align-items: flex-start;">
          <span style="color: var(--cyan); font-weight: 700; font-family: var(--font-heading);">Step 2:</span>
          <span>Return here and play with the <b>Interactive Widget</b> in <b>Section 1</b> to visualize what the theory and math look like in real time.</span>
        </div>
        <div style="display: flex; gap: 10px; align-items: flex-start;">
          <span style="color: var(--cyan); font-weight: 700; font-family: var(--font-heading);">Step 3:</span>
          <span>Take the <b>Quiz</b> in <b>Section 3</b> to lock in your XP and claim your badge!</span>
        </div>
      </div>
    </div>

    <h2 class="section">1 · Build intuition — play with the widget</h2>
    <div class="learning-list" style="margin: 16px 0 24px;">
      <div class="learning-item">
        <span class="marker-green">1</span>
        <span><b>Explore:</b> Poke the interactive widgets, adjust inputs, and notice how the state moves.</span>
      </div>
      <div class="learning-item">
        <span class="marker-green">2</span>
        <span><b>Predict:</b> Guess the statistics of measurement outcomes before you sample.</span>
      </div>
      <div class="learning-item">
        <span class="marker-green">3</span>
        <span><b>Observe:</b> Run measurements (shots) to see the random collapse align with probabilities.</span>
      </div>
    </div>
    <iframe src="widgets/${m.widget}/index.html" style="width:100%;height:560px;
      border:1px solid var(--line);border-radius:12px" title="${m.widget} interactive widget"></iframe>
    <p style="margin-top: 8px;"><a href="widgets/${m.widget}/index.html" target="_blank" rel="noopener">Open widget in a new tab ↗</a></p>
 
    <h2 class="section">2 · Do the physics — the interactive notebook</h2>
    <div class="learning-list" style="margin: 16px 0 24px;">
      <div class="learning-item">
        <span class="marker-green">✓</span>
        <span><b>Gap-Fill Challenges:</b> Complete incomplete code files to verify your mathematical understanding.</span>
      </div>
      <div class="learning-item">
        <span class="marker-green">✓</span>
        <span><b>Instant Checkers:</b> Get explainers on *why* your circuit or math failed, not just *that* it did.</span>
      </div>
      <div class="learning-item">
        <span class="marker-green">✓</span>
        <span><b>No Setup Required:</b> Open directly in Google Colab and run on free cloud servers.</span>
      </div>
    </div>
    <div style="display: flex; gap: 12px; margin-bottom: 24px;">
      <a class="btn" href="${colab}" target="_blank" rel="noopener">▶ Open in Google Colab</a>
      <a class="btn ghost" href="${nbviewer}" target="_blank" rel="noopener">Preview (nbviewer)</a>
    </div>
 
    <h2 class="section" id="quiz">3 · Prove it — the quiz</h2>
    <div id="quiz-box"></div>`}

    <div style="margin-top:36px;display:flex;justify-content:space-between">
      <span>${prev ? `<a href="module.html?id=${prev.id}">← Basecamp ${prev.id}: ${prev.title}</a>` : ""}</span>
      <span>${next ? `<a href="module.html?id=${next.id}">Basecamp ${next.id}: ${next.title} →</a>` : ""}</span>
    </div>`;

  if (!soon) {
    Progress.markOpened(id);
    renderQuiz("quiz-box", id, m);
  }
})();
</script>
</body>
</html>
