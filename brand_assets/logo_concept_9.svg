<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="sparkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="superGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Geometric Shards -->
  <!-- Left shard -->
  <path d="M50 20 L25 80 L50 65 Z" fill="url(#sparkGrad)" opacity="0.9"/>
  <!-- Right shard -->
  <path d="M50 20 L50 65 L75 80 Z" fill="url(#sparkGrad)" opacity="0.6"/>
  <!-- Bottom stabilizer shard -->
  <path d="M50 65 L25 80 L50 90 L75 80 Z" fill="url(#sparkGrad)" opacity="0.3"/>
  
  <!-- Glowing quantum spark (4-pointed star) -->
  <path d="M50 8 Q50 20, 38 20 Q50 20, 50 32 Q50 20, 62 20 Q50 20, 50 8 Z" fill="#ffffff" filter="url(#superGlow)"/>
  <!-- Center orange flare -->
  <circle cx="50" cy="20" r="3" fill="#fbbf24" filter="url(#superGlow)"/>
</svg>
