<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>
  <!-- Waveforms forming a mountain -->
  <path d="M10 80 Q 25 30, 40 60 T 70 20 T 90 80" fill="none" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round"/>
  <path d="M20 80 Q 35 45, 50 70 T 80 35 T 90 80" fill="none" stroke="url(#grad2)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Vertical state vectors (measurement lines) -->
  <line x1="40" y1="60" x2="40" y2="80" stroke="#26304f" stroke-width="1.5" stroke-dasharray="2 2"/>
  <line x1="70" y1="20" x2="70" y2="80" stroke="#26304f" stroke-width="1.5" stroke-dasharray="2 2"/>
  <!-- Rising nodes -->
  <circle cx="40" cy="60" r="4.5" fill="#8b5cf6"/>
  <circle cx="70" cy="20" r="6" fill="#22d3ee"/>
</svg>
