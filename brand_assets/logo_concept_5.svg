<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad5" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  <!-- Bracket 1 (Left slope) -->
  <path d="M 20 75 L 45 45 L 35 35" fill="none" stroke="url(#grad5)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bracket 2 (Right slope/summit) -->
  <path d="M 80 75 L 55 45 L 65 35" fill="none" stroke="url(#grad5)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ascent Arrow / Vector in the middle -->
  <path d="M 50 80 L 50 25" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 4"/>
  <!-- Arrow Head -->
  <path d="M 45 35 L 50 25 L 55 35" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glowing star at the peak -->
  <circle cx="50" cy="20" r="4" fill="#fbbf24"/>
</svg>
