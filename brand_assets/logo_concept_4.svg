<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circle (Bloch sphere) -->
  <circle cx="50" cy="50" r="42" fill="#0b1020" stroke="url(#grad4)" stroke-width="2"/>
  <!-- Glowing peak inside -->
  <path d="M50 25 L75 75 L25 75 Z" fill="url(#grad4)" filter="url(#glow)" opacity="0.8"/>
  <!-- Mountain ridge highlight -->
  <path d="M50 25 L50 75" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <!-- Qubit rings -->
  <ellipse cx="50" cy="50" rx="42" ry="15" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="2 3" opacity="0.5"/>
</svg>
