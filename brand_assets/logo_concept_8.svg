<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="cyberPink" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#db2777" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="cyberCyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="cyberGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Horizon line -->
  <line x1="5" y1="75" x2="95" y2="75" stroke="#1e293b" stroke-width="2"/>
  <!-- Perspective lines (grid floor) -->
  <line x1="50" y1="75" x2="10" y2="95" stroke="#1e293b" stroke-width="1"/>
  <line x1="50" y1="75" x2="30" y2="95" stroke="#1e293b" stroke-width="1"/>
  <line x1="50" y1="75" x2="50" y2="95" stroke="#1e293b" stroke-width="1"/>
  <line x1="50" y1="75" x2="70" y2="95" stroke="#1e293b" stroke-width="1"/>
  <line x1="50" y1="75" x2="90" y2="95" stroke="#1e293b" stroke-width="1"/>
  
  <!-- Cyber mountains -->
  <polygon points="50,20 75,75 25,75" fill="url(#cyberPink)" stroke="#ec4899" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="30,40 50,75 10,75" fill="none" stroke="#22d3ee" stroke-width="1.2" stroke-linejoin="round" opacity="0.7"/>
  <polygon points="70,45 88,75 52,75" fill="none" stroke="#22d3ee" stroke-width="1.2" stroke-linejoin="round" opacity="0.7"/>
  
  <!-- Ascending state vector beam -->
  <line x1="50" y1="75" x2="50" y2="10" stroke="#34d399" stroke-width="3" stroke-linecap="round" filter="url(#cyberGlow)"/>
  <polygon points="50,6 46,14 54,14" fill="#34d399" filter="url(#cyberGlow)"/>
</svg>
