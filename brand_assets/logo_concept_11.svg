<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="neonTrail" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <filter id="superGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Ascending trail lines -->
  <path d="M10 80 Q 30 75, 40 50 T 70 30 T 90 15" fill="none" stroke="url(#neonTrail)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Dashed secondary wave (interference/superposition) -->
  <path d="M10 80 Q 25 60, 45 65 T 75 25 T 90 15" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>
  
  <!-- Basecamp Qubits climbing up -->
  <circle cx="20" cy="78" r="3" fill="#4f46e5"/>
  <circle cx="34" cy="68" r="3.5" fill="#818cf8"/>
  <circle cx="48" cy="52" r="4.5" fill="#f472b6" filter="url(#superGlow)"/>
  <circle cx="62" cy="38" r="5" fill="#fb7185" filter="url(#superGlow)"/>
  <circle cx="76" cy="25" r="5.5" fill="#fca5a5" filter="url(#superGlow)"/>
  
  <!-- Glowing Summit Qubit -->
  <circle cx="90" cy="15" r="7" fill="#fbbf24" filter="url(#superGlow)"/>
  <!-- Vector arrow inside summit -->
  <path d="M90 19 L90 11 M87 14 L90 11 L93 14" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
