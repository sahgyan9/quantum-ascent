<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0b1020" stop-opacity="0" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0b1020" stop-opacity="0" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <!-- Left Mountain (Cyan) -->
  <path d="M10 80 L45 30 L65 80 Z" fill="url(#cyanGrad)" opacity="0.7"/>
  <path d="M10 80 L45 30 L65 80 Z" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <!-- Right Mountain (Violet) -->
  <path d="M35 80 L60 25 L90 80 Z" fill="url(#violetGrad)" opacity="0.6"/>
  <path d="M35 80 L60 25 L90 80 Z" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <!-- Overlap Region Highlight -->
  <path d="M35 80 L48 45 L60 25 L65 80 Z" fill="#fbbf24" opacity="0.1"/>
  <!-- Peak Qubits / States -->
  <circle cx="45" cy="30" r="3" fill="#22d3ee"/>
  <circle cx="60" cy="25" r="4.5" fill="#8b5cf6"/>
  <!-- Interference patterns (horizontal waves under the peaks) -->
  <path d="M15 85 Q 25 82, 35 85 T 55 85 T 75 85 T 85 85" fill="none" stroke="#26304f" stroke-width="1.5"/>
</svg>
