<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="prismLeft" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="prismRight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="80%" stop-color="#fbbf24" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
    <filter id="glowJuicy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background glow -->
  <circle cx="50" cy="55" r="30" fill="#22d3ee" opacity="0.15" filter="url(#glowJuicy)"/>
  
  <!-- Isometric Mountain (Prism) -->
  <!-- Left Face -->
  <path d="M50 15 L20 70 L50 85 Z" fill="url(#prismLeft)"/>
  <!-- Right Face -->
  <path d="M50 15 L50 85 L80 70 Z" fill="url(#prismRight)"/>
  
  <!-- Bloch sphere axis inside prism -->
  <line x1="50" y1="85" x2="50" y2="15" stroke="url(#beam)" stroke-width="2.5" stroke-linecap="round" filter="url(#glowJuicy)"/>
  
  <!-- Glowing peak particle -->
  <circle cx="50" cy="15" r="4.5" fill="#ffffff" filter="url(#glowJuicy)"/>
  <circle cx="50" cy="15" r="2" fill="#fbbf24"/>
  
  <!-- Orbiting qubit paths -->
  <path d="M15 65 C 15 50, 85 50, 85 65" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6" stroke-dasharray="3 3"/>
  <circle cx="28" cy="57" r="3" fill="#22d3ee" filter="url(#glowJuicy)"/>
</svg>
