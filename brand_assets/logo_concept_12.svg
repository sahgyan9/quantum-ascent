<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bluePurple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="intenseGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Bloch sphere grid in background -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#26304f" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.6"/>
  <ellipse cx="50" cy="50" rx="40" ry="12" fill="none" stroke="#26304f" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.6"/>
  
  <!-- Spiral Ascent Path wrapping around the sphere (climbing) -->
  <path d="M20 75 Q 35 85, 50 80 T 75 60 T 50 40 T 30 30 T 50 20" fill="none" stroke="url(#bluePurple)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Successive Bloch vector nodes along the spiral path -->
  <circle cx="21" cy="74" r="3" fill="#3b82f6"/>
  <circle cx="48" cy="80" r="3.5" fill="#60a5fa" filter="url(#intenseGlow)"/>
  <circle cx="73" cy="62" r="4" fill="#a78bfa" filter="url(#intenseGlow)"/>
  <circle cx="53" cy="41" r="4.5" fill="#c084fc" filter="url(#intenseGlow)"/>
  <circle cx="31" cy="30" r="5" fill="#e9d5ff" filter="url(#intenseGlow)"/>
  
  <!-- Peak/Summit Bloch Vector Arrow -->
  <line x1="50" y1="50" x2="50" y2="20" stroke="#22d3ee" stroke-width="3.5" stroke-linecap="round" filter="url(#intenseGlow)"/>
  <polygon points="50,14 45,23 55,23" fill="#22d3ee" filter="url(#intenseGlow)"/>
  
  <!-- Summit sphere -->
  <circle cx="50" cy="20" r="3" fill="#ffffff" filter="url(#intenseGlow)"/>
</svg>
